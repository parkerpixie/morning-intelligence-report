name: Update Morning Intelligence Report

on:
  schedule:
    # GitHub cron uses UTC. These run at 4:00 and 4:35 a.m. Central during daylight time,
    # with the second run acting as a fallback if the first is delayed or a feed is unavailable.
    - cron: "0 9 * * *"
    - cron: "35 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate_report.py"
      - "scripts/generate_report_v2.py"
      - "scripts/normalize_report.py"
      - "scripts/validate_and_archive.py"
      - ".github/workflows/update-report.yml"

permissions:
  contents: write

concurrency:
  group: morning-intelligence-report
  cancel-in-progress: false

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate personalized report from RSS feeds
        run: python scripts/generate_report_v2.py

      - name: Normalize report for the website
        run: python scripts/normalize_report.py

      - name: Validate and archive completed report
        run: python scripts/validate_and_archive.py

      - name: Commit refreshed report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json data/report-index.json data/story-history.json data/archive
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Refresh morning report"
            git push
          fi
